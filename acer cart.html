<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cart</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: rgb(198, 245, 198);
      }
      .kart0 {
        margin-top: 5px;
        height: 100vh;
        width: 100vw;
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: repeat(10, 1fr);
      }
      .kart1 {
        background-color: rgb(221, 250, 227);
        grid-area: 1/1/4/2;
        border: 2px solid;
        display: flex;
        justify-content: space-around;
      }
      img {
        height: 98%;
        padding-left: 10px;
      }
      .cart-product {
        display: flex;
        flex-direction: column;
      }
      .p1 {
        font-size: 1.7rem;
        color: rgb(1, 173, 1);
        font-weight: 600;
      }
      .p2 {
        font-size: 1.8rem;
        padding: 5px;
      }
      .p2 span {
        text-decoration: line-through;
        color: rgb(115, 115, 115);
      }
      .p3 {
        font-size: 1.6rem;
      }
      .kart-butt {
        padding-top: 0.8rem;
        padding-left: 1rem;
        display: flex;
        gap: 1rem;
      }
      .butt {
        padding: 0.6rem;
        font-size: 1.1rem;
        border-radius: 3px;
        border: none;
        background-color: rgb(230, 230, 23);
      }
      button:active {
        transform: scale(0.95);
        opacity: 0.8;
      }
      .main-page {
        grid-area: 4/1/6/2;

        display: flex;
        align-items: center;
        justify-content: center;
      }
      .button {
        padding: 0.5rem;
        font-size: 1.4rem;
        border: none;
        border-radius: 5px;
        color: antiquewhite;
        background-color: rgb(1, 75, 1);
      }
      .button:active {
        transform: scale(0.95);
        opacity: 0.8;
      }
      @media (max-width: 700px) {
        * {
          margin: 0;
          padding: 0;
        }

        .kart1 {
          background-color: rgb(221, 250, 227);
          grid-area: 1/1/3/2;
          border: 2px solid;
          display: flex;
          justify-content: space-around;
          align-items: center;
        }
        img {
          height: 75%;
          width: 30%;
          padding: 0;
        }
        .cart-product {
          display: flex;
          flex-direction: column;
        }
        .p1 {
          font-size: 1.1rem;
          color: rgb(1, 173, 1);
          font-weight: 600;
        }
        .p2 {
          font-size: 1.1rem;
          padding: 5px;
        }
        .p2 span {
          text-decoration: line-through;
          color: rgb(115, 115, 115);
        }
        .p3 {
          font-size: 1rem;
        }
        .kart-butt {
          padding-top: 0.8rem;
          padding-left: 1rem;
          display: flex;
          gap: 1rem;
        }
        .butt {
          padding: 0.3rem;
          font-size: 1rem;
          border-radius: 3px;
          border: none;
          background-color: rgb(230, 230, 23);
        }

        .main-page {
          grid-area: 3/1/4/2;
        }
        .button {
          padding: 0.5rem;
          font-size: 1.1rem;
          border: none;
          border-radius: 5px;
          color: antiquewhite;
          background-color: rgb(1, 75, 1);
        }
        .button:active {
          transform: scale(0.95);
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <div class="kart0">
      <div class="kart1">
        <img src="Product Images/product image 1.webp" alt="Acer Alg" />
        <div class="cart-product">
          <p class="p1">Acer ALG (2025) Intel Core i5 13th Gen 13420H</p>
          <p class="p2"><span>₹79,990</span> ₹67,990</p>
          <p class="p3">Delivery by Tuesday, 21 Apr</p>
          <div class="kart-butt">
            <a href="empty kart.html"><button class="butt">Remove</button></a>
            <a href="buy now.html"><button class="butt">Buy Now</button></a>
          </div>
        </div>
      </div>
      <div class="main-page">
        <a href="index.html"
          ><button class="button">Back to main page</button></a
        >
      </div>
    </div>
  </body>
</html>
